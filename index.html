<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Monitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        :root {
            --color-temp: #b71c1c;
            --color-hum: #2196f3;
            --color-abs: #2e7d32;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.5s ease; }
        .card h3 { margin: 0 0 8px 0; font-size: 1.2em; }
        .val { font-size: 2.2em; font-weight: bold; }
        .c-temp h3, #currTemp { color: var(--color-temp); }
        .c-hum h3, #currHum { color: var(--color-hum); }
        .c-abs h3, #currAbs { color: var(--color-abs); }
        .c-dew h3, #currDew { color: #555; }
        .chart-container { background: #1e1e1e; padding: 15px; border-radius: 12px; height: 400px; width: 100%; box-sizing: border-box; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        .control-group { display: flex; flex-direction: column; align-items: flex-start; }
        label { font-size: 1em; color: #ccc; margin-bottom: 5px; }
        select { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        h1 { font-size: 1.8em; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Astro-Monitor Pro</h1>
    <div class="card-grid">
        <div class="card c-temp"><h3>Temp</h3><div id="currTemp" class="val">--</div></div>
        <div class="card c-hum"><h3>Hum</h3><div id="currHum" class="val">--</div></div>
        <div id="dewCard" class="card c-dew"><h3>Taupunkt</h3><div id="currDew" class="val">--</div></div>
        <div class="card c-abs"><h3>Abs. Feuchte</h3><div id="currAbs" class="val">--</div></div>
    </div>
    <div class="chart-container"><canvas id="astroChart"></canvas></div>
    <div class="controls">
        <div class="control-group">
            <label>Sitzung:</label>
            <select id="sessionSelect" onchange="updateData()">
                <option value="">Lade...</option>
            </select>
        </div>
        <div class="control-group">
            <label>Datenpunkte:</label>
            <select id="limitSelect" onchange="updateData()">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="500">500</option>
                <option value="1000">1000</option>
                <option value="2000">2000</option>
                <option value="5000">5000</option>
            </select>
        </div>
    </div>
</div>

<script>
    if (typeof chartjsPluginAnnotation !== 'undefined') {
        Chart.register(chartjsPluginAnnotation);
    }

    const dbUrl = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/";
    const ctx = document.getElementById('astroChart').getContext('2d');
    const colorTemp = '#b71c1c', colorHum = '#2196f3';

    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Temp (°C)', borderColor: colorTemp, data: [], yAxisID: 'y', tension: 0.3, pointRadius: 0 },
            { label: 'Feuchte (%)', borderColor: colorHum, data: [], yAxisID: 'y1', tension: 0.3, pointRadius: 0 }
        ]},
        options: {
            responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
            scales: {
                y: { type: 'linear', position: 'left', ticks: { color: colorTemp, font: { size: 14 } }, grid: { color: '#333' } },
                y1: { type: 'linear', position: 'right', ticks: { color: colorHum, font: { size: 14 } }, grid: { display: false } }
            },
            plugins: { 
                legend: { labels: { font: { size: 14 }, color: '#fff' } },
                annotation: {
                    annotations: {
                        minLine: {
                            type: 'line', scaleID: 'y', value: 0,
                            borderColor: '#1565c0', borderWidth: 2, borderDash: [6, 6],
                            label: { display: true, content: 'Min', position: 'start', backgroundColor: 'rgba(21, 101, 192, 0.7)', color: '#fff', font: {size: 11} }
                        },
                        maxLine: {
                            type: 'line', scaleID: 'y', value: 0,
                            borderColor: '#ef6c00', borderWidth: 2, borderDash: [6, 6],
                            label: { display: true, content: 'Max', position: 'end', backgroundColor: 'rgba(239, 108, 0, 0.7)', color: '#fff', font: {size: 11} }
                        }
                    }
                }
            }
        }
    });

    function calcDewPoint(t, h) {
        const a = 17.27, b = 237.7;
        const alpha = ((a * t) / (b + t)) + Math.log(h / 100);
        return (b * alpha) / (a - alpha);
    }

    function updateDewColor(t, dp) {
        const delta = t - dp;
        const val = document.getElementById('currDew');
        const title = document.querySelector('.c-dew h3');
        let color = "#555555";
        if (delta <= 2) color = "#ff0000";
        else if (delta <= 5) color = "#ff9800";
        val.style.color = color;
        title.style.color = color;
    }

    function calcAbsHum(t, h) {
        return (6.112 * Math.exp((17.67 * t) / (t + 243.5)) * h * 2.1674) / (273.15 + t);
    }

    async function loadSessions() {
        try {
            const r = await fetch(`${dbUrl}.json?shallow=true`);
            const s = await r.json();
            if (!s) return;
            const sel = document.getElementById('sessionSelect');
            const cur = sel.value;
            const keys = Object.keys(s).filter(k => k !== "Regenmesser").sort().reverse();
            sel.innerHTML = "";
            keys.forEach(k => { 
                let o = document.createElement('option'); o.value = k; o.innerHTML = k; sel.appendChild(o); 
            });
            if (cur && keys.includes(cur)) sel.value = cur; else sel.selectedIndex = 0;
        } catch (e) { console.error(e); }
    }

    async function updateData() {
        const lim = document.getElementById('limitSelect').value;
        const ses = document.getElementById('sessionSelect').value;
        if (!ses) return;
        try {
            const r = await fetch(`${dbUrl}${ses}.json?orderBy="$key"&limitToLast=${lim}`);
            const data = await r.json();
            if (!data) return;
            const keys = Object.keys(data).sort();
            const lbls = [], tD = [], hD = [];
            let last;
            keys.forEach(k => {
                const e = data[k];
                lbls.push(e.ts || k.slice(-8));
                tD.push(e.temp || e.t || 0);
                hD.push(e.hum || e.h || 0);
                last = e;
            });
            
            if (last && tD.length > 0) {
                const t = (last.temp || last.t || 0), h = (last.hum || last.h || 0);
                const dp = calcDewPoint(t, h);
                document.getElementById('currTemp').innerText = t.toFixed(1) + "°C";
                document.getElementById('currHum').innerText = h.toFixed(1) + "%";
                document.getElementById('currDew').innerText = dp.toFixed(1) + "°C";
                document.getElementById('currAbs').innerText = calcAbsHum(t, h).toFixed(1) + " g/m³";
                updateDewColor(t, dp);

                const minT = Math.min(...tD);
                const maxT = Math.max(...tD);
                
                if (chart.options.plugins.annotation.annotations) {
                    chart.options.plugins.annotation.annotations.minLine.value = minT;
                    chart.options.plugins.annotation.annotations.minLine.label.content = 'Min: ' + minT.toFixed(1) + '°';
                    
                    chart.options.plugins.annotation.annotations.maxLine.value = maxT;
                    chart.options.plugins.annotation.annotations.maxLine.label.content = 'Max: ' + maxT.toFixed(1) + '°';
                }
            }
            
            chart.data.labels = lbls; 
            chart.data.datasets[0].data = tD; 
            chart.data.datasets[1].data = hD;
            chart.update('none');
        } catch (e) { console.error(e); }
    }

    async function init() {
        await loadSessions(); 
        await updateData();
        setInterval(loadSessions, 30000); 
        setInterval(updateData, 15000);
    }
    init();
</script>
</body>
</html>
