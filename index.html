<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Monitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card-row { display: flex; justify-content: space-around; gap: 15px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 45%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: background 0.5s; }
        .val { font-size: 2.2em; font-weight: bold; }
        #currTemp { color: #ff5722; }
        #currHum { color: #2196f3; }
        .chart-container { background: #1e1e1e; padding: 20px; border-radius: 12px; }
        .controls { margin-bottom: 20px; text-align: right; display: flex; justify-content: flex-end; gap: 15px; align-items: center; }
        select { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        label { font-size: 0.9em; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Astro-Monitor Pro</h1>
    
    <div class="controls">
        <div>
            <label>Mess-Sitzung:</label>
            <select id="sessionSelect" onchange="updateData()">
                <option value="verlauf">Lade Sitzungen...</option>
            </select>
        </div>
        <div>
            <label>Datenpunkte:</label>
            <select id="limitSelect" onchange="updateData()">
                <option value="50">Letzte 50</option>
                <option value="100">Letzte 100</option>
                <option value="500">Letzte 500</option>
                <option value="1000">Letzte 1000</option>
            </select>
        </div>
    </div>

    <div class="card-row">
        <div class="card"><h3>Temperatur</h3><div id="currTemp" class="val">--</div></div>
        <div class="card"><h3>Feuchtigkeit</h3><div id="currHum" class="val">--</div></div>
    </div>

    <div class="chart-container">
        <canvas id="astroChart"></canvas>
    </div>
</div>

<script>
    const dbUrl = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/";
    const ctx = document.getElementById('astroChart').getContext('2d');
    
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Temp (°C)', borderColor: '#ff5722', data: [], yAxisID: 'y', tension: 0.3, pointRadius: 0 },
            { label: 'Feuchte (%)', borderColor: '#2196f3', data: [], yAxisID: 'y1', tension: 0.3, pointRadius: 0 }
        ]},
        options: {
            responsive: true,
            animation: { duration: 0 },
            scales: {
                y: { position: 'left', ticks: { color: '#ff5722' }, grid: { color: '#333' } },
                y1: { position: 'right', min: 0, max: 100, ticks: { color: '#2196f3' }, grid: { display: false } }
            },
            plugins: { tooltip: { mode: 'index', intersect: false } }
        }
    });

    // Lädt Sitzungen und sortiert sie (neueste zuerst)
    async function loadSessions() {
        try {
            const response = await fetch(`${dbUrl}.json?shallow=true`);
            const sessions = await response.json();
            if (!sessions) return;

            const select = document.getElementById('sessionSelect');
            const currentSelected = select.value;
            
            // Alphabetisch absteigend sortieren (z.B. 2024 kommt vor 2023)
            const sortedKeys = Object.keys(sessions).sort().reverse();

            select.innerHTML = "";
            sortedKeys.forEach(key => {
                let opt = document.createElement('option');
                opt.value = key;
                opt.innerHTML = key;
                select.appendChild(opt);
            });
            
            if (sessions[currentSelected]) {
                select.value = currentSelected;
            } else if (sortedKeys.length > 0 && !currentSelected) {
                select.selectedIndex = 0;
            }
        } catch (e) { console.error("Session-Fehler:", e); }
    }

    async function updateData() {
        const limit = document.getElementById('limitSelect').value;
        const session = document.getElementById('sessionSelect').value;
        if (!session) return;

        const url = `${dbUrl}${session}.json?orderBy="$key"&limitToLast=${limit}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (!data) return;

            const sortedKeys = Object.keys(data).sort();
            const labels = [], tempD = [], humD = [];
            let last;

            sortedKeys.forEach(key => {
                const e = data[key];
                labels.push(e.ts || key.slice(-8)); 
                tempD.push(e.temp || e.t || 0);
                humD.push(e.hum || e.h || 0);
                last = e;
            });

            if (last) {
                const t = (last.temp || last.t || 0);
                const h = (last.hum || last.h || 0);

                document.getElementById('currTemp').innerText = t.toFixed(1) + "°C";
                document.getElementById('currHum').innerText = h.toFixed(1) + "%";
            }

            chart.data.labels = labels;
            chart.data.datasets[0].data = tempD;
            chart.data.datasets[1].data = humD;
            chart.update('none');
        } catch (e) { console.error("Update-Fehler:", e); }
    }

    async function init() {
        await loadSessions();
        await updateData();
        setInterval(loadSessions, 30000);
        setInterval(updateData, 15000);
    }

    init();
</script>
</body>
</html>
