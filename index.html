<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Monitor Pro | Logger</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        :root {
            --color-temp: #ff5252; /* Etwas helleres Rot für Dunkelmodus */
            --color-hum: #448aff; /* Etwas helleres Blau */
            --color-abs: #66bb6a;
            --color-dew: #90a4ae;
            --color-volt: #fbc02d;
            --bg-light: #121212;
            --card-bg: rgba(30, 30, 30, 0.95); /* Dunkelgrauer Hintergrund */
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            --color-online: #4caf50;
            --color-offline: #f44336;
            --text-main: #ecf0f1;
            --text-muted: #bdc3c7;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #1a2a6c 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            padding: 15px; 
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 1100px; 
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            position: relative;
        }

        .status-bar {
            grid-column: span 5;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: -5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--color-offline);
            border-radius: 50%;
            margin-left: 8px;
            transition: background-color 0.5s ease;
        }

        .status-dot.online {
            background-color: var(--color-online);
            box-shadow: 0 0 8px var(--color-online);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 12px 5px; 
            border-radius: 18px; 
            border: var(--border);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .card h3 { 
            margin: 0 0 5px 0; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 1.1px; 
            color: var(--text-muted);
        }

        .val-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .val { font-size: 1.6rem; font-weight: 700; }
        .trend { font-size: 1.1rem; font-weight: bold; }
        
        .c-temp .val { color: var(--color-temp); }
        .c-hum .val { color: var(--color-hum); }
        .c-abs .val { color: var(--color-abs); }
        .c-dew .val { color: var(--color-dew); }

        .chart-wrapper { 
            grid-column: span 5;
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 20px; 
            border: var(--border);
            box-shadow: var(--shadow);
            height: 320px;
        }

        .controls { 
            grid-column: span 5;
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 100px;
            border: var(--border);
            flex-wrap: wrap;
        }

        .control-group { display: flex; align-items: center; gap: 8px; }
        label { font-weight: 600; font-size: 0.7rem; color: var(--text-muted); }
        
        select { 
            background: #2c3e50; 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 4px 10px; 
            border-radius: 50px; 
            font-size: 11px;
            cursor: pointer;
            outline: none;
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .status-bar, .chart-wrapper, .controls { grid-column: span 2; }
            .c-volt { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span>LOGGER AKTIVITÄT</span>
        <div id="statusDot" class="status-dot"></div>
    </div>

    <!-- Messwerte Cards -->
    <div class="card c-temp">
        <h3>Temperatur</h3>
        <div class="val-container">
            <div id="currTemp" class="val">--</div>
            <div id="tempTrend" class="trend"></div>
        </div>
    </div>
    <div class="card c-hum">
        <h3>Feuchte</h3>
        <div class="val-container">
            <div id="currHum" class="val">--</div>
            <div id="humTrend" class="trend"></div>
        </div>
    </div>
    <div id="dewCard" class="card c-dew">
        <h3>Taupunkt</h3>
        <div class="val-container">
            <div id="currDew" class="val">--</div>
            <div id="dewTrend" class="trend"></div>
        </div>
    </div>
    <div class="card c-abs">
        <h3>Abs. Feuchte</h3>
        <div class="val-container">
            <div id="currAbs" class="val">--</div>
            <div id="absTrend" class="trend"></div>
        </div>
    </div>
    <div class="card c-volt">
        <h3>Spannung $U_B$</h3>
        <div class="val-container">
            <div id="currVolt" class="val">--</div>
            <div id="voltTrend" class="trend"></div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="astroChart"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>SESSION</label>
            <select id="sessionSelect" onchange="updateData()"></select>
        </div>
        <div class="control-group">
            <label>ANSICHT</label>
            <select id="limitSelect" onchange="updateData()">
                <option value="60">Letzte Stunde (~60 Pkt)</option>
                <option value="180" selected>3 Stunden (~180 Pkt)</option>
                <option value="360">6 Stunden (~360 Pkt)</option>
                <option value="720">12 Stunden (~720 Pkt)</option>
                <option value="1500">24 Stunden (~1500 Pkt)</option>
                <option value="10000">Komplette Session</option>
            </select>
        </div>
    </div>
</div>

<script>
    if (typeof ChartjsPluginAnnotation !== 'undefined') { Chart.register(ChartjsPluginAnnotation); }

    const dbUrl = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/";
    const ctx = document.getElementById('astroChart').getContext('2d');
    let lastDataTimestamp = 0;

    const chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: [], 
            datasets: [
                { 
                    label: 'Temp (°C)', 
                    data: [], 
                    yAxisID: 'y', 
                    tension: 0.3, 
                    pointRadius: 0,
                    borderWidth: 2.5,
                    borderColor: '#ff5252',
                    fill: true,
                    backgroundColor: 'rgba(255, 82, 82, 0.1)'
                },
                { 
                    label: 'Feuchte (%)', 
                    borderColor: '#448aff', 
                    data: [], 
                    yAxisID: 'y1', 
                    tension: 0.3, 
                    pointRadius: 0,
                    borderWidth: 1.5
                }
            ]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false, 
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { 
                    grid: { color: 'rgba(255,255,255,0.05)' }, 
                    ticks: { 
                        color: '#ff5252', 
                        font: { size: 10, weight: 'bold' },
                        callback: function(value) { return value.toFixed(1) + '°'; }
                    },
                    grace: '5%' 
                },
                y1: { 
                    position: 'right', 
                    grid: { display: false }, 
                    ticks: { 
                        color: '#448aff', 
                        font: { size: 10, weight: 'bold' },
                        callback: function(value) { return value.toFixed(0) + '%'; }
                    }
                },
                x: { 
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: '#bdc3c7', font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } 
                }
            },
            plugins: { 
                legend: { position: 'top', labels: { color: '#ecf0f1', boxWidth: 10, font: { size: 11 } } },
                annotation: { annotations: {
                    minLine: { type: 'line', scaleID: 'y', borderColor: 'rgba(68,138,255,0.4)', borderWidth: 1, label: { display: true, position: 'start', backgroundColor: 'rgba(0,0,0,0.5)', color: '#fff', font: { size: 9 } }},
                    maxLine: { type: 'line', scaleID: 'y', borderColor: 'rgba(255,82,82,0.4)', borderWidth: 1, label: { display: true, position: 'end', backgroundColor: 'rgba(0,0,0,0.5)', color: '#fff', font: { size: 9 } }}
                }}
            }
        }
    });

    function calcDewPoint(t, h) {
        if (h <= 0) return t - 50;
        const a = 17.27, b = 237.7;
        const alpha = ((a * t) / (b + t)) + Math.log(h / 100);
        return (b * alpha) / (a - alpha);
    }

    function calcAbsHum(t, h) {
        return (6.112 * Math.exp((17.67 * t) / (t + 243.5)) * h * 2.1674) / (273.15 + t);
    }

    function updateTrend(elementId, current, previous) {
        const el = document.getElementById(elementId);
        if (!el) return;
        if (previous === undefined || previous === null || Math.abs(current - previous) < 0.01) {
            el.textContent = "→"; el.style.color = "#7f8c8d";
        } else if (current > previous) {
            el.textContent = "↑"; el.style.color = "#ff5252";
        } else {
            el.textContent = "↓"; el.style.color = "#66bb6a";
        }
    }

    function updateStatusIndicator() {
        const dot = document.getElementById('statusDot');
        const now = Date.now();
        if (lastDataTimestamp > 0 && (now - lastDataTimestamp) < 70000) {
            dot.classList.add('online');
        } else {
            dot.classList.remove('online');
        }
    }

    async function loadSessions() {
        try {
            const r = await fetch(`${dbUrl}Datenlogger.json?shallow=true`);
            const s = await r.json();
            if (!s) return;
            const sel = document.getElementById('sessionSelect');
            const currentVal = sel.value;
            const keys = Object.keys(s).sort().reverse();
            sel.innerHTML = "";
            keys.forEach(k => { 
                const opt = document.createElement('option');
                opt.value = k; opt.textContent = k;
                sel.appendChild(opt); 
            });
            if (currentVal && keys.includes(currentVal)) sel.value = currentVal;
            else sel.selectedIndex = 0;
        } catch (e) { console.error(e); }
    }

    async function updateData() {
        const limit = document.getElementById('limitSelect').value;
        const session = document.getElementById('sessionSelect').value;
        if (!session) return;
        try {
            const response = await fetch(`${dbUrl}Datenlogger/${session}.json?orderBy="$key"&limitToLast=${limit}`);
            const data = await response.json();
            if (!data) return;

            const keys = Object.keys(data).sort();
            const labels = [], temps = [], hums = [], volts = [], dews = [], absHums = [];
            
            keys.forEach(k => {
                const entry = data[k];
                if (entry && typeof entry === 'object') {
                    const t = parseFloat(entry.t ?? 0);
                    const h = parseFloat(entry.h ?? 0);
                    const v = parseFloat(entry.v ?? 0);
                    const ts = entry.ts || k;
                    labels.push(ts);
                    temps.push(t);
                    hums.push(h);
                    volts.push(v);
                    dews.push(calcDewPoint(t, h));
                    absHums.push(calcAbsHum(t, h));
                }
            });

            if (temps.length > 0) {
                const idx = temps.length - 1;
                const prevIdx = Math.max(0, temps.length - 2);
                
                document.getElementById('currTemp').textContent = temps[idx].toFixed(1) + "°";
                document.getElementById('currHum').textContent = hums[idx].toFixed(0) + "%";
                document.getElementById('currDew').textContent = dews[idx].toFixed(1) + "°";
                document.getElementById('currAbs').textContent = absHums[idx].toFixed(1) + "g";
                
                const voltEl = document.getElementById('currVolt');
                voltEl.textContent = volts[idx].toFixed(2) + "V";
                voltEl.style.color = volts[idx] > 4.0 ? "#4caf50" : (volts[idx] < 3.8 ? "#f44336" : "#ff9800");

                updateTrend('tempTrend', temps[idx], temps[prevIdx]);
                updateTrend('humTrend', hums[idx], hums[prevIdx]);
                updateTrend('voltTrend', volts[idx], volts[prevIdx]);
                updateTrend('dewTrend', dews[idx], dews[prevIdx]);
                updateTrend('absTrend', absHums[idx], absHums[prevIdx]);

                chart.data.labels = labels;
                chart.data.datasets[0].data = temps;
                chart.data.datasets[1].data = hums;
                
                const minH = Math.min(...hums);
                const maxH = Math.max(...hums);
                const paddingH = 2; 
                chart.options.scales.y1.min = Math.max(0, Math.floor(minH - paddingH));
                chart.options.scales.y1.max = Math.min(100, Math.ceil(maxH + paddingH));

                const minT = Math.min(...temps);
                const maxT = Math.max(...temps);
                chart.options.plugins.annotation.annotations.minLine.value = minT;
                chart.options.plugins.annotation.annotations.minLine.label.content = 'Min: ' + minT.toFixed(1);
                chart.options.plugins.annotation.annotations.maxLine.value = maxT;
                chart.options.plugins.annotation.annotations.maxLine.label.content = 'Max: ' + maxT.toFixed(1);
                
                chart.update('none');

                const delta = temps[idx] - dews[idx];
                document.getElementById('dewCard').style.border = delta < 3 ? "2px solid #ff5252" : "1px solid rgba(255,255,255,0.1)";
                
                lastDataTimestamp = Date.now();
                updateStatusIndicator();
            }
        } catch (e) { console.error(e); }
    }

    async function init() {
        await loadSessions();
        await updateData();
        setInterval(loadSessions, 60000); 
        setInterval(updateData, 10000);
        setInterval(updateStatusIndicator, 5000);
    }
    window.onload = init;
</script>
</body>
</html>
