<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Monitor Pro | Light Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-temp: #dc2626;
            --accent-hum: #2563eb;
            --accent-abs: #16a34a;
            --accent-dew: #475569;
            --accent-volt: #d97706;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-primary); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 1200px; 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        header {
            grid-column: span 4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--card-border);
            margin-bottom: 10px;
        }

        header h1 { 
            margin: 0; 
            font-size: 1.25rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 700;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        .dot.online {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Metric Cards */
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card h3 { 
            margin: 0; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: var(--text-secondary);
            font-weight: 600;
        }

        .icon-box {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
        }

        .val-row {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .val { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .unit { font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; }
        .trend { font-size: 1.1rem; margin-left: auto; }
        
        /* Color Overrides */
        .c-temp .icon-box { color: var(--accent-temp); background: #fee2e2; }
        .c-hum .icon-box { color: var(--accent-hum); background: #dbeafe; }
        .c-dew .icon-box { color: var(--accent-dew); background: #f1f5f9; }
        .c-abs .icon-box { color: var(--accent-abs); background: #dcfce7; }

        /* Chart */
        .chart-wrapper { 
            grid-column: span 4;
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            border: 1px solid var(--card-border);
            height: 400px;
            box-shadow: var(--shadow);
        }

        /* Controls */
        .controls { 
            grid-column: span 4;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 24px; 
            background: #f1f5f9;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .control-group { display: flex; align-items: center; gap: 12px; }
        label { font-weight: 600; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        
        select { 
            background: white; 
            color: var(--text-primary); 
            border: 1px solid var(--card-border); 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #currVolt {
            font-weight: 700;
            padding: 4px 12px;
            background: white;
            border-radius: 6px;
            border: 1px solid var(--card-border);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            header, .chart-wrapper, .controls { grid-column: span 2; }
            .c-volt { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Astro Monitor <span style="color: var(--accent-hum);">Pro</span></h1>
        <div class="status-indicator">
            <div id="statusDot" class="dot"></div>
            <span id="statusText">Verbinde...</span>
        </div>
    </header>

    <div class="card c-temp">
        <div class="card-header">
            <h3>Temperatur</h3>
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
            </div>
        </div>
        <div class="val-row">
            <div id="currTemp" class="val">--</div>
            <div class="unit">°C</div>
            <div id="tempTrend" class="trend"></div>
        </div>
    </div>

    <div class="card c-hum">
        <div class="card-header">
            <h3>Feuchte</h3>
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
            </div>
        </div>
        <div class="val-row">
            <div id="currHum" class="val">--</div>
            <div class="unit">%</div>
            <div id="humTrend" class="trend"></div>
        </div>
    </div>

    <div id="dewCard" class="card c-dew">
        <div class="card-header">
            <h3>Taupunkt</h3>
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </div>
        </div>
        <div class="val-row">
            <div id="currDew" class="val">--</div>
            <div class="unit">°C</div>
            <div id="dewTrend" class="trend"></div>
        </div>
    </div>

    <div class="card c-abs">
        <div class="card-header">
            <h3>Abs. Feuchte</h3>
            <div class="icon-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
        </div>
        <div class="val-row">
            <div id="currAbs" class="val">--</div>
            <div class="unit">g/m³</div>
            <div id="absTrend" class="trend"></div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="astroChart"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Session</label>
            <select id="sessionSelect" onchange="updateData()"></select>
        </div>
        <div class="control-group">
            <label>Ansicht</label>
            <select id="limitSelect" onchange="updateData()">
                <option value="60">1 Stunde</option>
                <option value="180" selected>3 Stunden</option>
                <option value="360">6 Stunden</option>
                <option value="720">12 Stunden</option>
                <option value="1500">24 Stunden</option>
                <option value="10000">Ganze Session</option>
            </select>
        </div>
        <div class="control-group">
            <label>Batterie</label>
            <div id="currVolt">-- V</div>
        </div>
    </div>
</div>

<script>
    if (typeof ChartjsPluginAnnotation !== 'undefined') { Chart.register(ChartjsPluginAnnotation); }

    const dbUrl = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/";
    const ctx = document.getElementById('astroChart').getContext('2d');
    let lastDataTimestamp = 0;

    const chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: [], 
            datasets: [
                { 
                    label: 'Temperatur', 
                    data: [], 
                    yAxisID: 'y', 
                    tension: 0.35, 
                    pointRadius: 0,
                    borderWidth: 3,
                    borderColor: '#dc2626',
                    fill: true,
                    backgroundColor: 'rgba(220, 38, 38, 0.05)'
                },
                { 
                    label: 'Feuchtigkeit', 
                    borderColor: '#2563eb', 
                    data: [], 
                    yAxisID: 'y1', 
                    tension: 0.35, 
                    pointRadius: 0,
                    borderWidth: 2,
                    borderDash: [4, 4],
                    backgroundColor: 'transparent'
                }
            ]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false, 
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { 
                    grid: { color: '#f1f5f9' }, 
                    ticks: { color: '#dc2626', font: { weight: '600', size: 11 }, callback: v => v.toFixed(1) + '°' }
                },
                y1: { 
                    position: 'right', 
                    grid: { display: false }, 
                    ticks: { color: '#2563eb', font: { weight: '600', size: 11 }, callback: v => v.toFixed(0) + '%' }
                },
                x: { 
                    grid: { display: false },
                    ticks: { color: '#64748b', font: { size: 10 }, autoSkip: true, maxTicksLimit: 12 } 
                }
            },
            plugins: { 
                legend: { position: 'top', align: 'center', labels: { color: '#1e293b', usePointStyle: true, boxWidth: 8, font: { weight: '600', size: 12 } } },
                annotation: { annotations: {
                    minLine: { type: 'line', scaleID: 'y', borderColor: 'rgba(37, 99, 235, 0.15)', borderWidth: 1.5, label: { display: true, position: 'start', backgroundColor: '#f8fafc', color: '#1e293b', font: { size: 10, weight: '700' }, padding: 4 }},
                    maxLine: { type: 'line', scaleID: 'y', borderColor: 'rgba(220, 38, 38, 0.15)', borderWidth: 1.5, label: { display: true, position: 'end', backgroundColor: '#f8fafc', color: '#1e293b', font: { size: 10, weight: '700' }, padding: 4 }}
                }}
            }
        }
    });

    function calcDewPoint(t, h) {
        if (h <= 0) return t - 50;
        const a = 17.27, b = 237.7;
        const alpha = ((a * t) / (b + t)) + Math.log(h / 100);
        return (b * alpha) / (a - alpha);
    }

    function calcAbsHum(t, h) {
        return (6.112 * Math.exp((17.67 * t) / (t + 243.5)) * h * 2.1674) / (273.15 + t);
    }

    function updateTrend(elementId, current, previous) {
        const el = document.getElementById(elementId);
        if (!el) return;
        if (previous === undefined || previous === null || Math.abs(current - previous) < 0.01) {
            el.textContent = "—"; el.style.color = "#94a3b8";
        } else if (current > previous) {
            el.textContent = "▲"; el.style.color = "#ef4444";
        } else {
            el.textContent = "▼"; el.style.color = "#10b981";
        }
    }

    function updateStatusIndicator() {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        const now = Date.now();
        if (lastDataTimestamp > 0 && (now - lastDataTimestamp) < 70000) {
            dot.classList.add('online');
            txt.textContent = "VERBUNDEN";
            txt.style.color = "#16a34a";
        } else {
            dot.classList.remove('online');
            txt.textContent = "TRENNUNG";
            txt.style.color = "#dc2626";
        }
    }

    async function loadSessions() {
        try {
            const r = await fetch(`${dbUrl}Datenlogger.json?shallow=true`);
            const s = await r.json();
            if (!s) return;
            const sel = document.getElementById('sessionSelect');
            const currentVal = sel.value;
            const keys = Object.keys(s).sort().reverse();
            sel.innerHTML = "";
            keys.forEach(k => { 
                const opt = document.createElement('option');
                opt.value = k; opt.textContent = k;
                sel.appendChild(opt); 
            });
            if (currentVal && keys.includes(currentVal)) sel.value = currentVal;
            else sel.selectedIndex = 0;
        } catch (e) { console.error(e); }
    }

    async function updateData() {
        const limit = document.getElementById('limitSelect').value;
        const session = document.getElementById('sessionSelect').value;
        if (!session) return;
        try {
            const response = await fetch(`${dbUrl}Datenlogger/${session}.json?orderBy="$key"&limitToLast=${limit}`);
            const data = await response.json();
            if (!data) return;

            const keys = Object.keys(data).sort();
            const labels = [], temps = [], hums = [], volts = [], dews = [], absHums = [];
            
            keys.forEach(k => {
                const entry = data[k];
                if (entry && typeof entry === 'object') {
                    const t = parseFloat(entry.t ?? 0);
                    const h = parseFloat(entry.h ?? 0);
                    const v = parseFloat(entry.v ?? 0);
                    const ts = entry.ts || k;
                    labels.push(ts.split(' ')[1] || ts);
                    temps.push(t);
                    hums.push(h);
                    volts.push(v);
                    dews.push(calcDewPoint(t, h));
                    absHums.push(calcAbsHum(t, h));
                }
            });

            if (temps.length > 0) {
                const idx = temps.length - 1;
                const prevIdx = Math.max(0, temps.length - 2);
                
                document.getElementById('currTemp').textContent = temps[idx].toFixed(1);
                document.getElementById('currHum').textContent = hums[idx].toFixed(0);
                document.getElementById('currDew').textContent = dews[idx].toFixed(1);
                document.getElementById('currAbs').textContent = absHums[idx].toFixed(1);
                
                const voltEl = document.getElementById('currVolt');
                voltEl.textContent = volts[idx].toFixed(2) + " V";
                voltEl.style.color = volts[idx] > 4.0 ? "#16a34a" : (volts[idx] < 3.8 ? "#dc2626" : "#d97706");

                updateTrend('tempTrend', temps[idx], temps[prevIdx]);
                updateTrend('humTrend', hums[idx], hums[prevIdx]);
                updateTrend('dewTrend', dews[idx], dews[prevIdx]);
                updateTrend('absTrend', absHums[idx], absHums[prevIdx]);

                chart.data.labels = labels;
                chart.data.datasets[0].data = temps;
                chart.data.datasets[1].data = hums;
                
                const minH = Math.min(...hums);
                const maxH = Math.max(...hums);
                chart.options.scales.y1.min = Math.max(0, Math.floor(minH - 2));
                chart.options.scales.y1.max = Math.min(100, Math.ceil(maxH + 2));

                const minT = Math.min(...temps);
                const maxT = Math.max(...temps);
                chart.options.plugins.annotation.annotations.minLine.value = minT;
                chart.options.plugins.annotation.annotations.minLine.label.content = 'MIN ' + minT.toFixed(1) + '°';
                chart.options.plugins.annotation.annotations.maxLine.value = maxT;
                chart.options.plugins.annotation.annotations.maxLine.label.content = 'MAX ' + maxT.toFixed(1) + '°';
                
                chart.update('none');

                const delta = temps[idx] - dews[idx];
                const dewCard = document.getElementById('dewCard');
                if (delta < 3) {
                    dewCard.style.borderColor = "#dc2626";
                    dewCard.style.background = "#fff1f2";
                } else {
                    dewCard.style.borderColor = "var(--card-border)";
                    dewCard.style.background = "var(--card-bg)";
                }
                
                lastDataTimestamp = Date.now();
                updateStatusIndicator();
            }
        } catch (e) { console.error(e); }
    }

    async function init() {
        await loadSessions();
        await updateData();
        setInterval(loadSessions, 60000); 
        setInterval(updateData, 10000);
        setInterval(updateStatusIndicator, 5000);
    }
    window.onload = init;
</script>
</body>
</html>
